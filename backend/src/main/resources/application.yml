server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_finance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:775899}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: smart-finance-agent-jwt-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000

# LangChain4j - DashScope (通义千问)
langchain4j:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    chat-model:
      model-name: qwen3.5-plus
      temperature: 0.8
      top-p: 0.9
    embedding-model:
      model-name: text-embedding-v3

# 联网搜索配置
search:
  api-key: ${TAVILY_API_KEY:}
