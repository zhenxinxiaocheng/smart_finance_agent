server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:mysql://localhost:3306/smart_finance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  expiration: 86400000

# LangChain4j - DashScope (通义千问)
langchain4j:
  dashscope:
    chat-model:
      model-name: qwen3.6-flash
      temperature: 0.8
      top-p: 0.9
    embedding-model:
      model-name: gte-rerank-v2

# 联网搜索配置
search:
  api-key: ${TAVILY_API_KEY:}

bill:
  upload-dir: ${BILL_UPLOAD_DIR:uploads/bills}
  ai:
    endpoint: ${DASHSCOPE_VL_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    multimodal-model: ${DASHSCOPE_VL_MODEL:qwen3.5-omni-plus-2026-03-15}
